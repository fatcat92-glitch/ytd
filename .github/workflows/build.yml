name: Build YouTube Downloader

on:
  push:
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller yt-dlp pillow

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --windowed --name "YouTubeDownloader" --clean youtube_downloader.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: YouTubeDownloader-${{ runner.os }}
          path: |
            dist/YouTubeDownloader.exe
            dist/YouTubeDownloader
